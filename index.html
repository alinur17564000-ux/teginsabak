<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тегін сабақ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px 16px; background: #f5f5f5; }
    .form-wrap { background: white; padding: 32px 24px; border-radius: 12px; max-width: 400px; width: 100%; text-align: center; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #555; font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; text-align: left; font-size: 13px; color: #333; margin-bottom: 6px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #f0f4ff; margin-bottom: 20px; outline: none; }
    input:focus { border-color: #888; }
    button { width: 100%; padding: 16px; background: #111; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    .msg { margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
<div class="form-wrap">
  <h1>Тегін сабақ</h1>
  <p>Үйде отырып табыс табуды үйренгіңіз келсе, төмендегі форманы толтырыңыз.</p>
  <label>Имя</label>
  <input type="text" id="name" placeholder="Ат/Имя">
  <label>Телефон</label>
  <input type="tel" id="phone" value="+7" placeholder="+7">
  <button id="btn" onclick="submitForm()">Тегін сабақты көру</button>
  <p class="msg" id="msg"></p>
</div>
<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNu2jzX9_p7GAhrp0XA0BqufCorxjPan56raF1pXhdhY--ECGt7IK9w8ek08avuSfO4A/exec";

  function submitForm() {
    var name = document.getElementById("name").value.trim();
    var phone = document.getElementById("phone").value.trim();
    var btn = document.getElementById("btn");
    var msg = document.getElementById("msg");

    if (!name || !phone) {
      msg.textContent = "Пожалуйста, заполните все поля.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Отправляем...";

    var formData = new FormData();
    formData.append("name", name);
    formData.append("phone", phone);

    fetch(SCRIPT_URL, {
      method: "POST",
      body: formData
    })
    .then(() => {
      msg.style.color = "green";
      msg.textContent = "Заявка принята! Мы свяжемся с вами.";
      btn.textContent = "Отправлено ✓";
    })
    .catch(() => {
      msg.style.color = "red";
      msg.textContent = "Ошибка. Попробуйте ещё раз.";
      btn.disabled = false;
      btn.textContent = "Тегін сабақты көру";
    });
  }
</script>
</body>
</html>
